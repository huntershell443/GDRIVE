services:
  db:
    image: postgres:16-alpine
    container_name: gdrive_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gdrive}
      POSTGRES_USER: ${POSTGRES_USER:-gdrive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gdrive_change_me}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gdrive} -d ${POSTGRES_DB:-gdrive}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: gdrive_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./drive_simulator/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      MEDIA_ROOT: /app/gdrive_users
      OLLAMA_API_URL: ${OLLAMA_API_URL:-http://host.docker.internal:11434/api/generate}
    volumes:
      - ./:/app
      - media_data:/app/gdrive_users
      - static_data:/app/staticfiles
    ports:
      - "8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pg_data:
  media_data:
  static_data:
